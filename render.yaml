services:
  - type: web
    name: ciclorh-estagio
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --timeout 60
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ciclorh-db
          property: connectionString

databases:
  - name: ciclorh-db
    databaseName: ciclorh
    user: ciclorh
