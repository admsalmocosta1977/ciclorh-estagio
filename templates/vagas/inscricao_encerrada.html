<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vaga Encerrada</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
  body { background: #f0f4f8; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card-info { max-width: 440px; width: 100%; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,.12); }
  .icon-wrap { width: 72px; height: 72px; border-radius: 50%; background: #fee2e2; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; }
</style>
</head>
<body>
<div class="card card-info p-4 text-center">
  <div class="icon-wrap">
    <i class="bi bi-x-lg text-danger" style="font-size:2rem"></i>
  </div>
  <h4 class="fw-bold mb-1">Vaga encerrada</h4>
  <p class="text-muted mb-0">Esta vaga não está mais aceitando inscrições. Verifique com a empresa se há novas oportunidades disponíveis.</p>
</div>
</body>
</html>
