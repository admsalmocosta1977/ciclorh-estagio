{% extends 'base.html' %}
{% block title %}{{ 'Editar' if e else 'Novo' }} Estagiário{% endblock %}
{% block content %}
<div class="d-flex align-items-center gap-2 mb-4">
  <a href="{{ url_for('estagiarios') }}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left"></i></a>
  <h4 class="fw-bold mb-0">{{ 'Editar' if e else 'Novo' }} Estagiário</h4>
</div>

<div class="card">
  <div class="card-body">
    <form method="post">
      <div class="row g-3">
        <div class="col-md-8">
          <label class="form-label fw-semibold">Nome Completo *</label>
          <input type="text" name="nome" class="form-control" value="{{ e.nome if e else '' }}" required>
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold">CPF *</label>
          <input type="text" name="cpf" class="form-control" value="{{ e.cpf if e else '' }}" placeholder="000.000.000-00" required>
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold">RG</label>
          <input type="text" name="rg" class="form-control" value="{{ e.rg if e else '' }}">
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold">Data de Nascimento</label>
          <input type="date" name="data_nascimento" class="form-control" value="{{ e.data_nascimento if e else '' }}">
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold">Telefone</label>
          <input type="text" name="telefone" class="form-control" value="{{ e.telefone if e else '' }}" placeholder="(77) 9 0000-0000">
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">E-mail</label>
          <input type="email" name="email" class="form-control" value="{{ e.email if e else '' }}">
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Endereço (Logradouro, n.º, Bairro)</label>
          <input type="text" name="endereco" class="form-control" value="{{ e.endereco if e else '' }}" placeholder="Ex: Rua das Flores, 123, Centro">
        </div>
        <div class="col-md-3">
          <label class="form-label fw-semibold">Estado</label>
          <select name="estado" id="sel-estado" class="form-select">
            <option value="">-- Selecione --</option>
          </select>
        </div>
        <div class="col-md-5">
          <label class="form-label fw-semibold">Cidade</label>
          <select name="cidade" id="sel-cidade" class="form-select">
            <option value="">-- Selecione o estado primeiro --</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold">Banco</label>
          <input type="text" name="banco" class="form-control" value="{{ e.banco if e else '' }}">
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold">Agência</label>
          <input type="text" name="agencia" class="form-control" value="{{ e.agencia if e else '' }}">
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold">Conta</label>
          <input type="text" name="conta" class="form-control" value="{{ e.conta if e else '' }}">
        </div>
        <hr class="col-12 my-1">
        <div class="col-md-4">
          <label class="form-label fw-semibold">Nível de Ensino</label>
          <select name="tipo_ensino" class="form-select" id="sel-tipo-ensino">
            <option value="superior" {% if not e or e.tipo_ensino in ('superior', None, '') %}selected{% endif %}>Ensino Superior</option>
            <option value="tecnico" {% if e and e.tipo_ensino == 'tecnico' %}selected{% endif %}>Ensino Técnico</option>
            <option value="medio" {% if e and e.tipo_ensino == 'medio' %}selected{% endif %}>Ensino Médio</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold" id="lbl-semestre">Semestre Atual</label>
          <input type="number" name="semestre" class="form-control" id="inp-semestre"
                 min="1" max="10" value="{{ e.semestre if e and e.semestre else '' }}"
                 placeholder="Ex: 3">
          <div class="form-text" id="txt-semestre">Superior/Técnico: 1 a 10 — Médio: 1 a 3</div>
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold">Matrícula</label>
          <input type="text" name="matricula" class="form-control"
                 value="{{ e.matricula if e and e.matricula else '' }}"
                 placeholder="N.º de matrícula">
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold">Observações</label>
          <textarea name="obs" class="form-control" rows="2">{{ e.obs if e else '' }}</textarea>
        </div>
      </div>
      <hr>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>Salvar</button>
        <a href="{{ url_for('estagiarios') }}" class="btn btn-outline-secondary">Cancelar</a>
        {% if e %}
        <a href="{{ url_for('estagiario_excluir', id=e.id) }}" class="btn btn-outline-danger ms-auto"
           onclick="return confirm('Excluir este estagiário? Esta ação não pode ser desfeita.')">
          <i class="bi bi-trash me-1"></i>Excluir
        </a>
        {% endif %}
      </div>
    </form>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
const ESTADOS = [
  ['AC','Acre'],['AL','Alagoas'],['AP','Amapá'],['AM','Amazonas'],['BA','Bahia'],
  ['CE','Ceará'],['DF','Distrito Federal'],['ES','Espírito Santo'],['GO','Goiás'],
  ['MA','Maranhão'],['MT','Mato Grosso'],['MS','Mato Grosso do Sul'],['MG','Minas Gerais'],
  ['PA','Pará'],['PB','Paraíba'],['PR','Paraná'],['PE','Pernambuco'],['PI','Piauí'],
  ['RJ','Rio de Janeiro'],['RN','Rio Grande do Norte'],['RS','Rio Grande do Sul'],
  ['RO','Rondônia'],['RR','Roraima'],['SC','Santa Catarina'],['SP','São Paulo'],
  ['SE','Sergipe'],['TO','Tocantins']
];

const CIDADES = {
  AC: ['Rio Branco','Cruzeiro do Sul','Sena Madureira','Tarauacá','Feijó'],
  AL: ['Maceió','Arapiraca','Palmeira dos Índios','Rio Largo','Penedo','União dos Palmares'],
  AP: ['Macapá','Santana','Laranjal do Jari','Oiapoque'],
  AM: ['Manaus','Parintins','Itacoatiara','Manacapuru','Coari','Tefé'],
  BA: [
    'Aiquara','Anagé','Aracatu','Barra da Estiva','Barra do Choça','Belo Campo','Boa Nova',
    'Bom Jesus da Lapa','Bom Jesus da Serra','Brumado','Caculé','Caetité','Cafarnaum',
    'Cândido Sales','Caraíbas','Contendas do Sincorá','Condeúba','Cordeiros','Dom Basílio',
    'Encruzilhada','Feira de Santana','Guanambi','Ibiassucê','Ilhéus','Ipiaú','Itabuna',
    'Itagibá','Itamaraju','Ituaçu','Itapetinga','Jequié','Lagoa Real','Licínio de Almeida',
    'Macarani','Maetinga','Manoel Vitorino','Mirante','Mortugaba','Morro do Chapéu',
    'Mucugê','Palmas de Monte Alto','Piripá','Planalto','Poções','Porto Seguro',
    'Presidente Jânio Quadros','Ribeirão do Largo','Rio do Antônio','Salvador',
    'Santo Antônio de Jesus','Tremedal','Ubatã','Urandi','Vitória da Conquista'
  ],
  CE: ['Fortaleza','Caucaia','Juazeiro do Norte','Maracanaú','Sobral','Crato','Iguatu'],
  DF: ['Brasília','Ceilândia','Taguatinga','Samambaia','Planaltina'],
  ES: ['Vitória','Serra','Vila Velha','Cariacica','Cachoeiro de Itapemirim','Linhares'],
  GO: ['Goiânia','Aparecida de Goiânia','Anápolis','Rio Verde','Luziânia','Águas Lindas de Goiás'],
  MA: ['São Luís','Imperatriz','São José de Ribamar','Timon','Caxias','Codó'],
  MT: ['Cuiabá','Várzea Grande','Rondonópolis','Sinop','Tangará da Serra'],
  MS: ['Campo Grande','Dourados','Três Lagoas','Corumbá','Grande Dourados'],
  MG: ['Belo Horizonte','Uberlândia','Contagem','Juiz de Fora','Betim','Montes Claros','Ribeirão das Neves'],
  PA: ['Belém','Ananindeua','Santarém','Marabá','Parauapebas','Castanhal'],
  PB: ['João Pessoa','Campina Grande','Santa Rita','Patos','Bayeux','Sousa'],
  PR: ['Curitiba','Londrina','Maringá','Ponta Grossa','Cascavel','São José dos Pinhais'],
  PE: ['Recife','Caruaru','Olinda','Petrolina','Paulista','Jaboatão dos Guararapes'],
  PI: ['Teresina','Parnaíba','Picos','Floriano','Campo Maior'],
  RJ: ['Rio de Janeiro','São Gonçalo','Duque de Caxias','Nova Iguaçu','Niterói','Belford Roxo'],
  RN: ['Natal','Mossoró','Parnamirim','São Gonçalo do Amarante','Macaíba'],
  RS: ['Porto Alegre','Caxias do Sul','Pelotas','Canoas','Santa Maria','Gravataí'],
  RO: ['Porto Velho','Ji-Paraná','Ariquemes','Vilhena','Cacoal'],
  RR: ['Boa Vista','Rorainópolis','Caracaraí'],
  SC: ['Florianópolis','Joinville','Blumenau','São José','Criciúma','Chapecó'],
  SP: ['São Paulo','Guarulhos','Campinas','São Bernardo do Campo','Santo André','Osasco','Ribeirão Preto','Sorocaba'],
  SE: ['Aracaju','Nossa Senhora do Socorro','Lagarto','Itabaiana','São Cristóvão'],
  TO: ['Palmas','Araguaína','Gurupi','Porto Nacional','Paraíso do Tocantins']
};

const estadoAtual = "{{ e.estado if e and e.estado else '' }}";
const cidadeAtual = "{{ e.cidade if e and e.cidade else '' }}";

function popularEstados() {
  const sel = document.getElementById('sel-estado');
  ESTADOS.forEach(([sigla, nome]) => {
    const opt = document.createElement('option');
    opt.value = sigla;
    opt.textContent = sigla + ' - ' + nome;
    if (sigla === estadoAtual) opt.selected = true;
    sel.appendChild(opt);
  });
}

function popularCidades(estadoSigla, cidadeSel) {
  const sel = document.getElementById('sel-cidade');
  sel.innerHTML = '';
  const vazio = document.createElement('option');
  vazio.value = '';
  vazio.textContent = estadoSigla ? '-- Selecione a cidade --' : '-- Selecione o estado primeiro --';
  sel.appendChild(vazio);
  if (!estadoSigla || !CIDADES[estadoSigla]) return;
  CIDADES[estadoSigla].sort().forEach(cidade => {
    const opt = document.createElement('option');
    opt.value = cidade;
    opt.textContent = cidade;
    if (cidade === cidadeSel) opt.selected = true;
    sel.appendChild(opt);
  });
}

popularEstados();
popularCidades(estadoAtual, cidadeAtual);

document.getElementById('sel-estado').addEventListener('change', function() {
  popularCidades(this.value, '');
});

function atualizarLabelSemestre() {
  const tipo = document.getElementById('sel-tipo-ensino').value;
  const lbl = document.getElementById('lbl-semestre');
  const inp = document.getElementById('inp-semestre');
  const txt = document.getElementById('txt-semestre');
  if (tipo === 'medio') {
    lbl.textContent = 'Ano Atual';
    inp.max = 3;
    txt.textContent = 'Ensino Médio: 1º, 2º ou 3º Ano';
  } else {
    lbl.textContent = 'Semestre Atual';
    inp.max = 10;
    txt.textContent = 'Superior/Técnico: 1 a 10';
  }
}
document.getElementById('sel-tipo-ensino').addEventListener('change', atualizarLabelSemestre);
atualizarLabelSemestre();
</script>
{% endblock %}
