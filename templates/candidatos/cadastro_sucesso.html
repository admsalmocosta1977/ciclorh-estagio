<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro Realizado — Ciclo RH</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
  body { background: #f0f4f8; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card-sucesso { max-width: 460px; width: 100%; border-radius: 16px; border: none; box-shadow: 0 8px 32px rgba(0,0,0,.12); }
  .icon-check { width: 72px; height: 72px; border-radius: 50%; background: #d1fae5;
                display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; }
</style>
</head>
<body>
<div class="card card-sucesso p-4 text-center">
  <div class="icon-check">
    <i class="bi bi-check-lg text-success" style="font-size:2.2rem"></i>
  </div>
  <h4 class="fw-bold mb-1">Cadastro recebido!</h4>
  <p class="text-muted mb-3">
    Olá, <strong>{{ nome }}</strong>! Seus dados foram registrados no nosso banco de talentos.
    Nossa equipe entrará em contato quando surgir uma oportunidade compatível com o seu perfil.
  </p>
  <p class="text-muted small mb-0">
    <i class="bi bi-clock me-1"></i>Você não precisa fazer nada agora. Aguarde nosso contato.
  </p>
</div>
</body>
</html>
