<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Ciclo RH{% endblock %}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
<style>
  body { background: #f4f6fb; font-family: Arial, sans-serif; }
  .brand-bar { background: #1a2845; color: #fff; padding: 14px 24px; }
  .brand-bar .brand { font-size: 1.05rem; font-weight: 700; }
  .brand-bar small { color: #8fa8cc; font-size: .72rem; margin-left: 8px; }
  .card { border: none; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  .card-header { background: #fff; border-bottom: 1px solid #e8ecf1; border-radius: 12px 12px 0 0 !important; font-weight: 600; }
</style>
</head>
<body>
<div class="brand-bar mb-4">
  <span class="brand">Ciclo RH</span>
  <small>Sistema de Estágio — Cadastro Online</small>
</div>
<div class="container" style="max-width:640px; padding-bottom:40px">
  {% with msgs = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in msgs %}
    <div class="alert alert-{{ cat }} alert-dismissible fade show" role="alert">
      {{ msg }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
