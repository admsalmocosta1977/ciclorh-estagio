<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Ciclo RH{% endblock %}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
<style>
  body { background: #f4f6fb; font-family: Arial, sans-serif; }
  .brand-bar { background: #1a2845; color: #fff; padding: 14px 24px; }
  .brand-bar .brand { font-size: 1.05rem; font-weight: 700; }
  .brand-bar small { color: #8fa8cc; font-size: .72rem; margin-left: 8px; }
  .card { border: none; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  .card-header { background: #fff; border-bottom: 1px solid #e8ecf1; border-radius: 12px 12px 0 0 !important; font-weight: 600; }
</style>
</head>
<body>
<div class="brand-bar mb-4">
  <span class="brand">Ciclo RH</span>
  <small>Sistema de Estágio — Cadastro Online</small>
</div>
<div class="container" style="max-width:640px; padding-bottom:40px">
  {% with msgs = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in msgs %}
    <div class="alert alert-{{ cat }} alert-dismissible fade show" role="alert">
      {{ msg }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
const ESTADOS_BR=[['AC','Acre'],['AL','Alagoas'],['AP','Amapá'],['AM','Amazonas'],['BA','Bahia'],['CE','Ceará'],['DF','Distrito Federal'],['ES','Espírito Santo'],['GO','Goiás'],['MA','Maranhão'],['MT','Mato Grosso'],['MS','Mato Grosso do Sul'],['MG','Minas Gerais'],['PA','Pará'],['PB','Paraíba'],['PR','Paraná'],['PE','Pernambuco'],['PI','Piauí'],['RJ','Rio de Janeiro'],['RN','Rio Grande do Norte'],['RS','Rio Grande do Sul'],['RO','Rondônia'],['RR','Roraima'],['SC','Santa Catarina'],['SP','São Paulo'],['SE','Sergipe'],['TO','Tocantins']];
const CIDADES_BR={AC:['Rio Branco','Cruzeiro do Sul','Sena Madureira','Tarauacá','Feijó'],AL:['Maceió','Arapiraca','Palmeira dos Índios','Rio Largo','Penedo','União dos Palmares'],AP:['Macapá','Santana','Laranjal do Jari','Oiapoque'],AM:['Manaus','Parintins','Itacoatiara','Manacapuru','Coari','Tefé'],BA:['Aiquara','Anagé','Aracatu','Barra da Estiva','Barra do Choça','Belo Campo','Boa Nova','Bom Jesus da Lapa','Bom Jesus da Serra','Brumado','Caculé','Caetité','Cafarnaum','Cândido Sales','Caraíbas','Contendas do Sincorá','Condeúba','Cordeiros','Dom Basílio','Encruzilhada','Feira de Santana','Guanambi','Ibiassucê','Ilhéus','Ipiaú','Itabuna','Itagibá','Itamaraju','Ituaçu','Itapetinga','Jequié','Lagoa Real','Licínio de Almeida','Macarani','Maetinga','Manoel Vitorino','Mirante','Mortugaba','Morro do Chapéu','Mucugê','Palmas de Monte Alto','Piripá','Planalto','Poções','Porto Seguro','Presidente Jânio Quadros','Ribeirão do Largo','Rio do Antônio','Salvador','Santo Antônio de Jesus','Tremedal','Ubatã','Urandi','Vitória da Conquista'],CE:['Fortaleza','Caucaia','Juazeiro do Norte','Maracanaú','Sobral','Crato','Iguatu'],DF:['Brasília','Ceilândia','Taguatinga','Samambaia','Planaltina'],ES:['Vitória','Serra','Vila Velha','Cariacica','Cachoeiro de Itapemirim','Linhares'],GO:['Goiânia','Aparecida de Goiânia','Anápolis','Rio Verde','Luziânia'],MA:['São Luís','Imperatriz','São José de Ribamar','Timon','Caxias','Codó'],MT:['Cuiabá','Várzea Grande','Rondonópolis','Sinop','Tangará da Serra'],MS:['Campo Grande','Dourados','Três Lagoas','Corumbá'],MG:['Belo Horizonte','Uberlândia','Contagem','Juiz de Fora','Betim','Montes Claros','Ribeirão das Neves'],PA:['Belém','Ananindeua','Santarém','Marabá','Parauapebas','Castanhal'],PB:['João Pessoa','Campina Grande','Santa Rita','Patos','Bayeux','Sousa'],PR:['Curitiba','Londrina','Maringá','Ponta Grossa','Cascavel','São José dos Pinhais'],PE:['Recife','Caruaru','Olinda','Petrolina','Paulista','Jaboatão dos Guararapes'],PI:['Teresina','Parnaíba','Picos','Floriano','Campo Maior'],RJ:['Rio de Janeiro','São Gonçalo','Duque de Caxias','Nova Iguaçu','Niterói','Belford Roxo'],RN:['Natal','Mossoró','Parnamirim','São Gonçalo do Amarante','Macaíba'],RS:['Porto Alegre','Caxias do Sul','Pelotas','Canoas','Santa Maria','Gravataí'],RO:['Porto Velho','Ji-Paraná','Ariquemes','Vilhena','Cacoal'],RR:['Boa Vista','Rorainópolis','Caracaraí'],SC:['Florianópolis','Joinville','Blumenau','São José','Criciúma','Chapecó'],SP:['São Paulo','Guarulhos','Campinas','São Bernardo do Campo','Santo André','Osasco','Ribeirão Preto','Sorocaba'],SE:['Aracaju','Nossa Senhora do Socorro','Lagarto','Itabaiana','São Cristóvão'],TO:['Palmas','Araguaína','Gurupi','Porto Nacional','Paraíso do Tocantins']};
function initEstadoCidade(estadoId,cidadeId,estadoAtual,cidadeAtual,defaultEstado){
  const se=document.getElementById(estadoId),sc=document.getElementById(cidadeId);
  if(!se||!sc)return;
  ESTADOS_BR.forEach(([s,n])=>{const o=document.createElement('option');o.value=s;o.textContent=s+' - '+n;if(s===(estadoAtual||defaultEstado))o.selected=true;se.appendChild(o);});
  function pop(uf,sel){sc.innerHTML='';const v=document.createElement('option');v.value='';v.textContent=uf?'-- Selecione a cidade --':'-- Selecione o estado primeiro --';sc.appendChild(v);if(!uf||!CIDADES_BR[uf])return;[...CIDADES_BR[uf]].sort().forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;if(c===sel)o.selected=true;sc.appendChild(o);});}
  pop(estadoAtual||defaultEstado,cidadeAtual);
  se.addEventListener('change',function(){pop(this.value,'');});
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
